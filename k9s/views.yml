# $XDG_CONFIG_HOME/k9s/views.yml
k9s:
  views:
    v1/nodes:
      columns:
        - NAME
        - STATUS
        - ROLE
        - VERSION
        - PODS
        - AGE

    # Alters the pod view column layout. Uses GVR as key
    v1/pods:
      columns:
        - NAMESPACE
        - NAME
        - STATUS
        - RESTARTS
        - READY
        - AGE
        - IP
        - NODE

    # Alters the service view column layout
    v1/services:
      columns:
        - AGE
        - NAMESPACE
        - NAME
        - TYPE
        - CLUSTER-IP
